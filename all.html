<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Geist:wght@100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link href="https://cdn.jsdelivr.net/npm/daisyui@5" rel="stylesheet" type="text/css" />
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <!-- Navigation Section -->
    <div class="navbar flex-col md:flex-row bg-base-100 shadow-sm gap-2.5 p-3 md:p-6">
        <div class="navbar-start w-full items-center justify-center md:justify-start flex-1">
            <a class="flex items-center justify-center font-semibold text-xl"><img class="w-9 mr-2.5" src="./assets/github-logo.png" alt="GitHub Logo">GitHub Issues Tracker</a>
        </div>

        <div
        class="navbar-end space-x-2.5 flex-1 flex-wrap md:flex-nowrap items-center justify-center md:justify-end w-full gap-2.5">
        <label class="input hover:border-indigo-300 focus:border-indigo-500 focus:outline-indigo-400 focus:ring-indigo-500">
            <svg class="h-[1em] opacity-50" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24">
            <g stroke-linejoin="round" stroke-linecap="round" stroke-width="2.5" fill="none" stroke="currentColor">
                <circle cx="11" cy="11" r="8"></circle>
                <path d="m21 21-4.3-4.3"></path>
            </g>
            </svg>
            <input id="search-input" type="search" required placeholder="Search issues" />
        </label>
        <a class="btn btn-primary hover:bg-[#4A00FF]"><i class="fa-solid fa-plus"></i> New Issue</a>
        </div>
    </div>

    <!-- JavaScript Link -->
  <script src="./js/all.js"></script>
</body>
</html>
